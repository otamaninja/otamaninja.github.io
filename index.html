<!DOCTYPE html>
<html>

  <head>
    <title>OTSim</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
      html, body {
          margin: 0;
          padding: 0;
          overflow: hidden;
          height: 100%;
          width: 100%;
          position: fixed;
          background-color: #CCC;
          background-size: cover;
          background-position: center;
          background-repeat: no-repeat;
          --body-color: #000000;
          --detail-color: #FFFFFF;
      }

      #bg-overlay {
          position: fixed;
          inset: 0;
          background: rgba(0, 0, 0, 0);
          pointer-events: none;
          z-index: 1;
          transition: background 0.3s ease;
      }

      #stage {
          position: absolute;
          width: 400px;
          height: 800px;
          transform-origin: center center;
          z-index: 2;
      }

      .soundSlider {
          width: 56px;
          height: 800px;
          background: var(--body-color);
          position: absolute;
          top: 0;
          left: 0;
          touch-action: none;
      }
      .soundSlider::before, .soundSlider::after {
          content: "";
          position: absolute;
          left: 0;
          width: 100%;
          height: 2px;
          background: var(--detail-color);
      }
      .soundSlider::before {
          top: 4%;
      }
      .soundSlider::after {
          bottom: 15%;
      }
      .note-mark-line {
          position: absolute;
          left: 0;
          width: 100%;
          pointer-events: none;
      }
      .note-mark-label {
          position: absolute;
          left: 100%;
          margin-left: 4px;
          font-size: 11px;
          font-family: sans-serif;
          white-space: nowrap;
          transform: translateY(-50%);
          pointer-events: none;
          background: rgba(255,255,255,0.75);
          padding: 0 3px;
          border-radius: 3px;
      }
      .practice-highlight {
          position: absolute;
          left: -6px;
          width: calc(100% + 12px);
          height: 14px;
          margin-top: -7px;
          background: #FF9900;
          border-radius: 7px;
          box-shadow: 0 0 12px 4px rgba(255, 153, 0, 0.9);
          pointer-events: none;
          display: none;
          transition: top 0.12s ease-out;
          z-index: 5;
      }
      .practice-note-display {
          position: fixed;
          top: 50px;
          left: 50%;
          transform: translateX(-50%);
          font-family: sans-serif;
          font-size: 2em;
          font-weight: bold;
          color: #333;
          background: rgba(255, 255, 255, 0.9);
          padding: 6px 20px;
          border-radius: 10px;
          display: none;
          z-index: 20;
          text-align: center;
      }
      .practice-stop-button {
          position: fixed;
          top: 108px;
          left: 50%;
          transform: translateX(-50%);
          font-family: sans-serif;
          font-size: 1em;
          font-weight: bold;
          color: #FFF;
          background: #FF6347;
          border: none;
          padding: 8px 20px;
          border-radius: 999px;
          box-shadow: 0 3px 8px rgba(0,0,0,0.35);
          display: none;
          z-index: 20;
          cursor: pointer;
      }
      .face {
          width: 190px;
          height: 190px;
          background: var(--body-color);
          border: 2px solid rgba(0,0,0,0.15);
          box-sizing: border-box;
          position: absolute;
          bottom: 50px;
          left: 34%;
          transform: translateX(-50%);
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          border-radius: 50%;
      }
      .tail-container {
          position: absolute;
          top: 20px;
          left: 10%;
          transform-origin: left center;
      }
      .tail {
          width: 200px;
          height: 50px;
          background: var(--body-color);
          border: 2px solid rgba(0,0,0,0.15);
          box-sizing: border-box;
          border-radius: 30px;
          transform-origin: left center;
          animation: wag 1s infinite alternate ease-in-out;
      }
      .tail-end {
          width: 80px;
          height: 80px;
          background: var(--body-color);
          border: 2px solid rgba(0,0,0,0.15);
          box-sizing: border-box;
          position: absolute;
          bottom: -40px;
          right: 0px;
          border-radius: 30px;
      }
      @keyframes wag {
          0% {
              transform: rotate(-10deg);
          }
          100% {
              transform: rotate(10deg);
          }
      }
      .eyes {
          display: flex;
          justify-content: space-between;
          width: 60%;
          margin-bottom: 12px;
      }
      .eye {
          width: 20px;
          height: 20px;
          background: var(--detail-color);
          border-radius: 50%;
      }
      .mouth {
          width: 100px;
          height: 10px;
          background: var(--detail-color);
          margin-top: 10px;
          transition: height 0.3s ease-in-out;
      }
      .mouth.open {
          height: 30px;
          border-radius: 10px;
      }
      .brand-badge {
          position: fixed;
          top: 6px;
          left: 50%;
          transform: translateX(-50%);
          padding: 5px 16px;
          border-radius: 999px;
          background: linear-gradient(90deg, #6a11cb, #2575fc);
          color: #FFFFFF;
          font-family: sans-serif;
          font-weight: bold;
          font-size: 0.78em;
          letter-spacing: 0.3px;
          box-shadow: 0 3px 8px rgba(0,0,0,0.35);
          white-space: nowrap;
          z-index: 30;
          pointer-events: none;
          max-width: 90vw;
          overflow: hidden;
          text-overflow: ellipsis;
      }

      /* ---- 設定を1つにまとめたモーダル ---- */
      .settings-gear {
          position: fixed;
          bottom: 10px;
          font-size: 1.4em;
          width: 2.2em;
          height: 2.2em;
          border-radius: 50%;
          border: none;
          background: #555;
          color: #FFF;
          cursor: pointer;
          z-index: 25;
          box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      }
      .settings-backdrop {
          position: fixed;
          inset: 0;
          background: rgba(0,0,0,0.4);
          z-index: 40;
          display: none;
      }
      .settings-modal {
          position: fixed;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          width: min(88vw, 22em);
          max-height: 82vh;
          overflow-y: auto;
          background: #FFF;
          border-radius: 10px;
          padding: 16px;
          box-shadow: 0 8px 24px rgba(0,0,0,0.4);
          z-index: 41;
          display: none;
          font-family: sans-serif;
      }
      .settings-modal-header {
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 10px;
      }
      .settings-modal-header .title {
          font-weight: bold;
          font-size: 1.1em;
      }
      .settings-close {
          border: none;
          background: #EEE;
          border-radius: 50%;
          width: 2em;
          height: 2em;
          font-size: 1em;
          cursor: pointer;
      }
      .settings-section {
          border-top: 1px solid #E0E0E0;
          padding: 12px 0;
      }
      .settings-section:first-of-type {
          border-top: none;
          padding-top: 0;
      }
      .settings-section-title {
          font-weight: bold;
          margin-bottom: 6px;
      }
      .settings-section label {
          display: inline-block;
          margin-right: 12px;
          margin-bottom: 4px;
      }
    </style>
  </head>

  <body>
    <div id="bg-overlay"></div>
    <div id="stage">
      <div class="face" id="face">
        <div class="eyes">
          <div class="eye"></div>
          <div class="eye"></div>
        </div>
        <div class="mouth" id="mouth"></div>
      </div>
      <div class="tail-container" id="tail-container">
        <div class="tail" id="tail">
          <div class="tail-end"></div>
        </div>
      </div>
      <!-- soundSlider は JS が生成してここに追加します -->
    </div>

    <script>
      const T = {
          ja: {
              toggle: "反転",
              settings: "⚙ 設定",
              settingsTitle: "設定",
              rangeTitle: "音域",
              low: "低い", mid: "中", high: "高い",
              volumeTitle: "音量",
              colorTitle: "色",
              black: "黒", white: "白", pink: "ピンク", blue: "青",
              bgTitle: "背景",
              gray: "グレー", cream: "クリーム", mint: "ミント", lavender: "ラベンダー", peach: "ピーチ",
              photo: "写真: ",
              clearPhoto: "写真を消す",
              practiceTitle: "🐸 かえるのうた",
              verySlow: "とてもゆっくり", slow: "ゆっくり", normal: "ふつう",
              start: "▶ スタート", stop: "■ ストップ", stopFloating: "■ ストップ",
              langTitle: "言語",
              brand: "非公式アプリ OTSim・気に入ったら本物を買おう!"
          },
          en: {
              toggle: "Toggle",
              settings: "⚙ Settings",
              settingsTitle: "Settings",
              rangeTitle: "Range",
              low: "LOW", mid: "MID", high: "HIGH",
              volumeTitle: "Volume",
              colorTitle: "Color",
              black: "Black", white: "White", pink: "Pink", blue: "Blue",
              bgTitle: "Background",
              gray: "Gray", cream: "Cream", mint: "Mint", lavender: "Lavender", peach: "Peach",
              photo: "Photo: ",
              clearPhoto: "Clear photo",
              practiceTitle: "🐸 Frog Song",
              verySlow: "Very Slow", slow: "Slow", normal: "Normal",
              start: "▶ Start", stop: "■ Stop", stopFloating: "■ Stop",
              langTitle: "Language",
              brand: "Unofficial App OTSim・Like it? Get the real one!"
          }
      };

      class SoundController {
          constructor() {
              this.context = new AudioContext();
              this.snds = [];
              this.gainNode = null;
              this.waveformType = "sine";
              this.freqMidHigh = 1046.50; // C5
              this.freqMidLow = 130.81; // C3
              this.mirrored = false; // false = 通常, true = 反転
              this.lang = "ja";
              this.mouth = document.getElementById("mouth");
              this.face = document.getElementById("face");
              this.tailContainer = document.getElementById("tail-container");
              this.stage = document.getElementById("stage");
              this.designW = 400;
              this.designH = 800;
              this.i18nRefs = []; // { el, key } のリスト。言語切替時にまとめて更新する

              this.createUI();
              this.createFrequencyDisplay();
              this.resizeStage();
              this.renderNoteMarks();
              this.applyLanguage("ja");

              window.addEventListener("resize", () => this.updateMirror());
              window.addEventListener("orientationchange", () => setTimeout(() => this.updateMirror(), 100));
          }

          registerText(el, key) {
              this.i18nRefs.push({ el, key });
          }

          applyLanguage(lang) {
              this.lang = lang;
              const dict = T[lang];
              this.i18nRefs.forEach(({ el, key }) => {
                  el.textContent = dict[key];
              });
              this.updatePracticeButtonText();
          }

          updatePracticeButtonText() {
              this.practiceButton.textContent = this.practicePlaying ? T[this.lang].stop : T[this.lang].start;
          }

          resizeStage() {
              const scale = Math.min(window.innerWidth / this.designW, window.innerHeight / this.designH);
              this.stage.style.left = ((window.innerWidth - this.designW) / 2) + "px";
              this.stage.style.top = ((window.innerHeight - this.designH) / 2) + "px";
              this.stage.style.transform = `scale(${this.mirrored ? -scale : scale}, ${scale})`;
          }

          makeRadioLabel(container, groupName, key, checked, onChange) {
              const label = document.createElement('label');
              const radio = document.createElement('input');
              radio.type = "radio";
              radio.name = groupName;
              radio.checked = checked;
              radio.addEventListener("change", onChange);
              const span = document.createElement('span');
              this.registerText(span, key);
              label.appendChild(radio);
              label.appendChild(span);
              container.appendChild(label);
              return radio;
          }

          addSection(title) {
              const section = document.createElement('div');
              section.classList.add('settings-section');
              const heading = document.createElement('div');
              heading.classList.add('settings-section-title');
              this.registerText(heading, title);
              section.appendChild(heading);
              this.settingsModal.appendChild(section);
              return section;
          }

          createUI() {
              this.soundSlider = document.createElement('div');
              this.soundSlider.classList.add('soundSlider');
              this.stage.append(this.soundSlider);

              // ---- ブランドバッジ ----
              this.brandBadge = document.createElement('div');
              this.brandBadge.classList.add('brand-badge');
              this.registerText(this.brandBadge, "brand");
              document.body.append(this.brandBadge);

              // ---- Toggle(ミラー反転)----
              this.positionButton = document.createElement('button');
              this.positionButton.style.position = "fixed";
              this.positionButton.style.bottom = "10px";
              this.positionButton.style.padding = "10px 20px";
              this.positionButton.style.fontSize = "1.2em";
              this.positionButton.style.backgroundColor = "#007BFF";
              this.positionButton.style.color = "#FFF";
              this.positionButton.style.border = "none";
              this.positionButton.style.borderRadius = "5px";
              this.positionButton.style.cursor = "pointer";
              this.positionButton.style.zIndex = "10";
              this.registerText(this.positionButton, "toggle");
              this.positionButton.addEventListener("click", () => {
                  this.mirrored = !this.mirrored;
                  this.updateMirror();
              });
              document.body.append(this.positionButton);

              // ---- ⚙ 設定ボタン(全パネルをまとめたモーダルを開く)----
              this.settingsGearButton = document.createElement('button');
              this.settingsGearButton.classList.add('settings-gear');
              this.settingsGearButton.innerText = "⚙";
              this.settingsGearButton.title = "Settings";
              document.body.append(this.settingsGearButton);

              // ---- 設定モーダル本体 ----
              this.settingsBackdrop = document.createElement('div');
              this.settingsBackdrop.classList.add('settings-backdrop');
              document.body.append(this.settingsBackdrop);

              this.settingsModal = document.createElement('div');
              this.settingsModal.classList.add('settings-modal');
              document.body.append(this.settingsModal);

              const header = document.createElement('div');
              header.classList.add('settings-modal-header');
              const headerTitle = document.createElement('div');
              headerTitle.classList.add('title');
              this.registerText(headerTitle, "settingsTitle");
              const closeBtn = document.createElement('button');
              closeBtn.classList.add('settings-close');
              closeBtn.innerText = "✕";
              header.appendChild(headerTitle);
              header.appendChild(closeBtn);
              this.settingsModal.appendChild(header);

              const openSettings = () => {
                  this.settingsBackdrop.style.display = "block";
                  this.settingsModal.style.display = "block";
              };
              const closeSettings = () => {
                  this.settingsBackdrop.style.display = "none";
                  this.settingsModal.style.display = "none";
              };
              this.settingsGearButton.addEventListener("click", openSettings);
              closeBtn.addEventListener("click", closeSettings);
              this.settingsBackdrop.addEventListener("click", closeSettings);

              // ---- 音域(LOW/MID/HIGH)----
              const rangeSection = this.addSection("rangeTitle");
              [["LOW", "low"], ["MID", "mid"], ["HIGH", "high"]].forEach(([level, key]) => {
                  this.makeRadioLabel(rangeSection, "frequency", key, level === "MID", () => {
                      switch (level) {
                          case "LOW":
                              this.freqMidHigh = 261.63; // C4
                              this.freqMidLow = 32.70; // C1
                              break;
                          case "HIGH":
                              this.freqMidHigh = 4186.01; // C8
                              this.freqMidLow = 523.25; // C5
                              break;
                          default:
                              this.freqMidHigh = 1046.50; // C6
                              this.freqMidLow = 130.81; // C3
                              break;
                      }
                      this.renderNoteMarks();
                  });
              });

              // ---- 音量 ----
              this.volume = 0.8;
              const volumeSection = this.addSection("volumeTitle");
              const volumeSlider = document.createElement('input');
              volumeSlider.type = "range";
              volumeSlider.min = "0";
              volumeSlider.max = "100";
              volumeSlider.value = String(this.volume * 100);
              volumeSlider.style.width = "100%";
              volumeSlider.addEventListener("input", (e) => {
                  this.volume = e.target.value / 100;
                  if (this.gainNode && this.snd) {
                      this.gainNode.gain.setValueAtTime(this.volume, this.context.currentTime);
                  }
              });
              volumeSection.appendChild(volumeSlider);

              // ---- 色 ----
              const colorSection = this.addSection("colorTitle");
              const colorOptions = [
                  { key: "black", body: "#000000", detail: "#FFFFFF" },
                  { key: "white", body: "#FFFFFF", detail: "#333333" },
                  { key: "pink", body: "#FFD1DC", detail: "#333333" },
                  { key: "blue", body: "#BEE3F8", detail: "#333333" }
              ];
              colorOptions.forEach(opt => {
                  this.makeRadioLabel(colorSection, "bodyColor", opt.key, opt.key === "black", () => {
                      document.body.style.setProperty("--body-color", opt.body);
                      document.body.style.setProperty("--detail-color", opt.detail);
                  });
              });

              // ---- 背景 ----
              const bgSection = this.addSection("bgTitle");
              const bgColorOptions = [
                  { key: "gray", color: "#CCCCCC" },
                  { key: "cream", color: "#FDF6E3" },
                  { key: "mint", color: "#E0F5E9" },
                  { key: "lavender", color: "#EDE7F6" },
                  { key: "peach", color: "#FFE8DC" }
              ];
              bgColorOptions.forEach(opt => {
                  this.makeRadioLabel(bgSection, "bgColor", opt.key, opt.key === "gray", () => {
                      document.body.style.backgroundImage = "";
                      document.body.style.backgroundColor = opt.color;
                      document.getElementById('bg-overlay').style.background = "rgba(0, 0, 0, 0)";
                  });
              });

              const bgImageLabel = document.createElement('label');
              bgImageLabel.style.display = "block";
              bgImageLabel.style.marginTop = "8px";
              const photoSpan = document.createElement('span');
              this.registerText(photoSpan, "photo");
              bgImageLabel.appendChild(photoSpan);
              const bgImageInput = document.createElement('input');
              bgImageInput.type = "file";
              bgImageInput.accept = "image/*";
              bgImageInput.addEventListener("change", (e) => {
                  const file = e.target.files[0];
                  if (file) {
                      const url = URL.createObjectURL(file);
                      document.body.style.backgroundImage = `url("${url}")`;
                      document.getElementById('bg-overlay').style.background = "rgba(255, 255, 255, 0.6)";
                  }
              });
              bgImageLabel.appendChild(bgImageInput);
              bgSection.appendChild(bgImageLabel);

              const bgClearButton = document.createElement('button');
              bgClearButton.style.marginTop = "8px";
              bgClearButton.style.width = "100%";
              bgClearButton.style.padding = "6px";
              this.registerText(bgClearButton, "clearPhoto");
              bgClearButton.addEventListener("click", () => {
                  document.body.style.backgroundImage = "";
                  bgImageInput.value = "";
                  document.getElementById('bg-overlay').style.background = "rgba(0, 0, 0, 0)";
              });
              bgSection.appendChild(bgClearButton);

              // ---- 言語 ----
              const langSection = this.addSection("langTitle");
              [["ja", "日本語"], ["en", "English"]].forEach(([code, display]) => {
                  const label = document.createElement('label');
                  const radio = document.createElement('input');
                  radio.type = "radio";
                  radio.name = "lang";
                  radio.checked = code === "ja";
                  radio.addEventListener("change", () => this.applyLanguage(code));
                  label.appendChild(radio);
                  label.appendChild(document.createTextNode(display));
                  langSection.appendChild(label);
              });

              // ---- かえるのうた練習モード ----
              const practiceSection = this.addSection("practiceTitle");
              this.practiceSpeed = 2000; // ms/音符(とてもゆっくり=初期値、シニア向け)
              [["verySlow", 2000], ["slow", 900], ["normal", 550]].forEach(([key, ms], i) => {
                  this.makeRadioLabel(practiceSection, "practiceSpeed", key, i === 0, () => {
                      this.practiceSpeed = ms;
                  });
              });

              this.practiceButton = document.createElement('button');
              this.practiceButton.style.marginTop = "8px";
              this.practiceButton.style.display = "block";
              this.practiceButton.style.width = "100%";
              this.practiceButton.style.padding = "8px";
              this.practiceButton.style.fontSize = "1em";
              this.practiceButton.style.backgroundColor = "#4CAF50";
              this.practiceButton.style.color = "#FFF";
              this.practiceButton.style.border = "none";
              this.practiceButton.style.borderRadius = "5px";
              this.practiceButton.style.cursor = "pointer";
              this.practiceButton.addEventListener("click", () => {
                  if (this.practicePlaying) {
                      this.stopKaeruSong();
                  } else {
                      this.startKaeruSong();
                      closeSettings(); // スタートしたら設定を閉じてバーを見やすくする
                  }
              });
              practiceSection.appendChild(this.practiceButton);

              this.practiceHighlight = document.createElement('div');
              this.practiceHighlight.classList.add('practice-highlight');
              this.soundSlider.appendChild(this.practiceHighlight);

              this.practiceNoteDisplay = document.createElement('div');
              this.practiceNoteDisplay.classList.add('practice-note-display');
              document.body.appendChild(this.practiceNoteDisplay);

              this.practiceStopButton = document.createElement('button');
              this.practiceStopButton.classList.add('practice-stop-button');
              this.registerText(this.practiceStopButton, "stopFloating");
              this.practiceStopButton.addEventListener("click", () => this.stopKaeruSong());
              document.body.appendChild(this.practiceStopButton);

              this.updateMirror();

              // iOSでは pointerdown が「音声再生を許可するユーザー操作」として
              // 認識されない場合があるため、touchstart でも確実に resume() する
              this.soundSlider.addEventListener("touchstart", () => {
                  if (this.context.state === "suspended") {
                      this.context.resume();
                  }
              }, { passive: true });

              this.soundSlider.addEventListener("pointerdown", (e) => {
                  if (this.context.state === "suspended") {
                      this.context.resume();
                  }
                  try {
                      this.soundSlider.setPointerCapture(e.pointerId);
                  } catch (err) {
                      // 一部のiOSバージョンでエラーになることがあるが、
                      // 無視しても演奏機能自体には影響しない
                  }
                  const freq = this.calcFrequency(e.clientY);
                  this.playSin(freq);
                  this.updateFrequencyDisplay(freq);
              });
              this.soundSlider.addEventListener("pointermove", (e) => {
                  if (this.snd) {
                      const freq = this.calcFrequency(e.clientY);
                      this.snd.frequency.value = freq;
                      this.updateFrequencyDisplay(freq);
                  }
              });
              this.soundSlider.addEventListener("pointerup", () => {
                  this.stopSin();
                  this.freqDisplay.style.visibility = "hidden";
              });
              this.soundSlider.addEventListener("pointercancel", () => {
                  this.stopSin();
                  this.freqDisplay.style.visibility = "hidden";
              });
          }

          noteFreq(letter, octave) {
              const semitone = { C: 0, D: 2, E: 4, F: 5, G: 7, A: 9, B: 11 }[letter];
              const midi = 12 * (octave + 1) + semitone;
              return 440 * Math.pow(2, (midi - 69) / 12);
          }

          // 「かえるの合唱」(ドイツ民謡)の正しい音階。baseOctave を変えることで
          // LOW/MID/HIGH のどの音域が選ばれていても、その範囲に収まるように移調できる
          getKaeruSequence(baseOctave = 4) {
              const soundJP = { C: "ド", D: "レ", E: "ミ", F: "ファ", G: "ソ", A: "ラ", B: "シ" };
              const notes = [
                  'C', 'D', 'E', 'F', 'E', 'D', 'C',
                  'E', 'F', 'G', 'A', 'G', 'F', 'E',
                  'C', 'C', 'C', 'C',
                  'C', 'C', 'D', 'D', 'E', 'E', 'F', 'F',
                  'E', 'D', 'C'
              ];
              return notes.map(letter => ({
                  freq: this.noteFreq(letter, baseOctave),
                  label: `${soundJP[letter]} (${letter}${baseOctave})`
              }));
          }

          startKaeruSong() {
              // 現在選ばれている音域(LOW/MID/HIGH)に収まるオクターブを選ぶ
              const radios = Array.from(document.querySelectorAll('input[name="frequency"]'));
              const checkedIndex = radios.findIndex(r => r.checked);
              const baseOctave = checkedIndex === 0 ? 3 : checkedIndex === 2 ? 5 : 4; // 0=LOW→3, 1=MID→4, 2=HIGH→5

              this.kaeruSequence = this.getKaeruSequence(baseOctave);
              this.kaeruIndex = 0;
              this.practicePlaying = true;
              this.updatePracticeButtonText();
              this.practiceButton.style.backgroundColor = "#FF6347";
              this.practiceHighlight.style.display = "block";
              this.practiceNoteDisplay.style.display = "block";
              this.practiceStopButton.style.display = "block";
              this.stepKaeruSong();
          }

          stepKaeruSong() {
              if (!this.practicePlaying) return;
              if (this.kaeruIndex >= this.kaeruSequence.length) {
                  this.stopKaeruSong();
                  return;
              }
              const note = this.kaeruSequence[this.kaeruIndex];
              const normP = Math.sqrt(Math.max(0, (note.freq - this.freqMidLow) / (this.freqMidHigh - this.freqMidLow)));
              const rel = 0.06 + normP * 0.80;
              this.practiceHighlight.style.top = (rel * 100) + "%";
              this.practiceNoteDisplay.innerText = note.label;

              this.kaeruIndex++;
              this.practiceTimer = setTimeout(() => this.stepKaeruSong(), this.practiceSpeed);
          }

          stopKaeruSong() {
              this.practicePlaying = false;
              if (this.practiceTimer) clearTimeout(this.practiceTimer);
              this.updatePracticeButtonText();
              this.practiceButton.style.backgroundColor = "#4CAF50";
              this.practiceHighlight.style.display = "none";
              this.practiceNoteDisplay.style.display = "none";
              this.practiceStopButton.style.display = "none";
          }

          calcFrequency(clientY) {
              const rect = this.soundSlider.getBoundingClientRect();
              const rel = Math.min(1, Math.max(0, (clientY - rect.top) / rect.height));
              const normP = Math.min(1, Math.max(0, (rel - 0.06) / 0.80));
              const curved = normP * normP;
              return this.freqMidLow + curved * (this.freqMidHigh - this.freqMidLow);
          }

          renderNoteMarks() {
              this.soundSlider.querySelectorAll('.note-mark-line, .note-mark-label').forEach(el => el.remove());

              const diatonic = [
                  { label: "ド", semitone: 0 },
                  { label: "レ", semitone: 2 },
                  { label: "ミ", semitone: 4 },
                  { label: "ファ", semitone: 5 },
                  { label: "ソ", semitone: 7 },
                  { label: "ラ", semitone: 9 },
                  { label: "シ", semitone: 11 }
              ];

              for (let octave = 0; octave <= 8; octave++) {
                  diatonic.forEach(note => {
                      const midi = 12 * (octave + 1) + note.semitone;
                      const freq = 440 * Math.pow(2, (midi - 69) / 12);
                      if (freq < this.freqMidLow || freq > this.freqMidHigh) return;

                      const normP = Math.sqrt(Math.max(0, (freq - this.freqMidLow) / (this.freqMidHigh - this.freqMidLow)));
                      const rel = 0.06 + normP * 0.80;
                      const topPercent = rel * 100;
                      const isDo = note.label === "ド";

                      const line = document.createElement('div');
                      line.classList.add('note-mark-line');
                      line.style.top = topPercent + "%";
                      line.style.height = isDo ? "3px" : "1px";
                      line.style.background = isDo ? "#FFD700" : "rgba(255,255,255,0.55)";
                      this.soundSlider.appendChild(line);

                      if (isDo) {
                          const label = document.createElement('div');
                          label.classList.add('note-mark-label');
                          label.innerText = `C${octave}`;
                          label.style.top = topPercent + "%";
                          label.style.transform = this.mirrored
                              ? "translateY(-50%) scaleX(-1)"
                              : "translateY(-50%)";
                          this.soundSlider.appendChild(label);
                      }
                  });
              }
          }

          updateMirror() {
              this.resizeStage();
              if (this.soundSlider) {
                  this.renderNoteMarks();
              }

              // バーの実際の描画幅を計算し、その分だけ Toggle と ⚙ をバーから離す
              const scale = Math.min(window.innerWidth / this.designW, window.innerHeight / this.designH);
              const barClearance = Math.ceil(56 * scale) + 16;

              if (!this.mirrored) {
                  // バーは左側 → ボタン類は右側(バーと反対)に置く
                  this.positionButton.style.right = "1em";
                  this.positionButton.style.left = "";
                  this.settingsGearButton.style.right = "4.5em";
                  this.settingsGearButton.style.left = "";
              } else {
                  // バーは右側 → ボタン類は左側に置く
                  this.positionButton.style.left = "1em";
                  this.positionButton.style.right = "";
                  this.settingsGearButton.style.left = "4.5em";
                  this.settingsGearButton.style.right = "";
              }
          }

          createFrequencyDisplay() {
              this.freqDisplay = document.createElement('div');
              this.freqDisplay.style.position = "fixed";
              this.freqDisplay.style.left = "6rem";
              this.freqDisplay.style.top = "0px";
              this.freqDisplay.style.color = "#FFF";
              this.freqDisplay.style.fontSize = "1.5em";
              this.freqDisplay.style.backgroundColor = "rgba(0, 0, 0, 0.5)";
              this.freqDisplay.style.padding = "0.5em";
              this.freqDisplay.style.borderRadius = "0.5em";
              this.freqDisplay.style.visibility = "hidden";
              this.freqDisplay.style.zIndex = "10";
              document.body.appendChild(this.freqDisplay);
          }

          playSin(freq) {
              if (this.snd) return;
              if (this.context.state === "suspended") {
                  this.context.resume();
              }
              this.snd = this.context.createOscillator();
              this.snd.type = this.waveformType;
              this.snd.frequency.value = freq;

              this.gainNode = this.context.createGain();
              this.gainNode.gain.setValueAtTime(this.volume, this.context.currentTime);
              this.gainNode.connect(this.context.destination);

              this.snd.connect(this.gainNode);
              this.snd.start();
              if (this.mouth) this.mouth.classList.add("open");
          }

          stopSin() {
              if (this.snd && this.context) {
                  this.gainNode.gain.setValueAtTime(this.volume, this.context.currentTime);
                  this.gainNode.gain.linearRampToValueAtTime(0, this.context.currentTime + 0.3);
                  const removedSnd = this.snd;
                  this.snd = null;
                  setTimeout(() => {
                      removedSnd.stop();
                      removedSnd.disconnect();
                      if (this.mouth) this.mouth.classList.remove("open");
                  }, 300);
              }
          }

          updateFrequencyDisplay(freq) {
              this.freqDisplay.innerText = `Freq: ${freq.toFixed(0)} Hz`;
              this.freqDisplay.style.visibility = "visible";
          }
      }

      const soundController = new SoundController();
    </script>
  </body>
